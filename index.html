<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assistant IA Les Montagnettes</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="chatbot.css?v=20260623-1800" />
  </head>
  <body>
    <main id="module-preview">
      <p class="preview-loading">Chargement du module...</p>
    </main>

    <script>
      fetch("elementor-module.html?v=20260623-1800")
        .then(function (response) {
          if (!response.ok) throw new Error("Module HTML introuvable");
          return response.text();
        })
        .then(function (html) {
          var template = document.createElement("template");
          template.innerHTML = html;

          template.content
            .querySelectorAll("link[rel='stylesheet'], script, link[rel='icon']")
            .forEach(function (element) {
              element.remove();
            });

          var preview = document.querySelector("#module-preview");
          preview.innerHTML = "";
          preview.appendChild(template.content);

          if (window.initMontagnettesAI) {
            window.initMontagnettesAI();
          }
        })
        .catch(function (error) {
          document.querySelector("#module-preview").innerHTML =
            "<p class='preview-error'>Erreur : " + error.message + "</p>";
        });
    </script>
    <script src="chatbot.js?v=20260623-1800" charset="UTF-8"></script>
  </body>
</html>
